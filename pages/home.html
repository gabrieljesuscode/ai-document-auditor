<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="home.css">
    <title>AI Document Auditor</title>
</head>
<body>
    <h1>AI Document Auditor</h1>
    <br>
    <form action="/docsave" method="post" enctype="multipart/form-data">    
        
        <label for="file" id="fileSelector">
            Mande a foto do seu pagamento
            <br>(.png, .jpg, .pdf)<br>
            <span id="loading"></span>
        </label>

        <input type="file" id="file" name="doc" accept="image/*,.pdf">

        <input type="submit" class="btn" id="submitBtn" value="Analisar Arquivo" disabled>
    </form>

    <script src="home.js"></script>
</body>
</html>
